<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - AI Interviewer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#d8dadf",
                        "on-tertiary-container": "#fffbff",
                        "on-tertiary-fixed": "#291800",
                        "secondary-fixed": "#e0e3e6",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb953",
                        "surface-container": "#eceef3",
                        "on-surface-variant": "#414751",
                        "on-surface": "#191c20",
                        "on-tertiary": "#ffffff",
                        "secondary": "#5b5f61",
                        "tertiary-container": "#a06900",
                        "tertiary-fixed": "#ffddb4",
                        "tertiary": "#7f5300",
                        "outline-variant": "#c1c7d3",
                        "inverse-primary": "#a4c9ff",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#616567",
                        "on-secondary-fixed": "#191c1e",
                        "surface": "#f8f9ff",
                        "inverse-on-surface": "#eff0f6",
                        "surface-tint": "#0060ac",
                        "primary-container": "#2976c7",
                        "secondary-fixed-dim": "#c4c7ca",
                        "surface-variant": "#e1e2e8",
                        "on-secondary-fixed-variant": "#44474a",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e1e2e8",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e6e8ed",
                        "primary-fixed": "#d4e3ff",
                        "on-primary-fixed-variant": "#004883",
                        "outline": "#717783",
                        "on-error": "#ffffff",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#a4c9ff",
                        "on-tertiary-fixed-variant": "#633f00",
                        "on-primary-container": "#fdfcff",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f8f9ff",
                        "on-primary-fixed": "#001c39",
                        "on-background": "#191c20",
                        "surface-container-low": "#f2f3f9",
                        "inverse-surface": "#2e3135",
                        "secondary-container": "#e0e3e6",
                        "surface-bright": "#f8f9ff",
                        "primary": "#005da7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "stack-sm": "8px",
                        "container-padding": "32px",
                        "base-unit": "4px",
                        "mobile-nav-height": "64px",
                        "stack-md": "16px",
                        "sidebar-width": "260px",
                        "stack-lg": "24px"
                    },
                    "fontFamily": {
                        "body-base": ["Inter"],
                        "label-uppercase": ["Inter"],
                        "body-sm": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-base": ["14px", {"lineHeight": "22px", "letterSpacing": "0", "fontWeight": "400"}],
                        "label-uppercase": ["11px", {"lineHeight": "16px", "letterSpacing": "0.06em", "fontWeight": "600"}],
                        "body-sm": ["13px", {"lineHeight": "18px", "letterSpacing": "0", "fontWeight": "400"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.03em", "fontWeight": "700"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #f8f9ff;
        }
    </style>
</head>
<body class="font-body-base text-on-background min-h-screen flex flex-col items-center justify-center p-6 md:p-gutter">
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col justify-center relative z-10">
<!-- Card Shell -->
<div class="bg-surface-container-lowest rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.06),0_1px_2px_rgba(0,0,0,0.03)] border border-outline-variant/30 flex flex-col overflow-hidden">
<!-- Header Section -->
<div class="px-10 pt-10 pb-8 text-center">
<div class="mb-6 flex justify-center">
<div class="w-14 h-14 bg-primary rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="neurology">neurology</span>
</div>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface tracking-tight">Welcome Back</h1>
<p class="mt-2 text-on-surface-variant font-body-base">Please enter your details to sign in</p>
</div>
<!-- Form Content -->
<div class="px-10 pb-12">
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-uppercase text-label-uppercase text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<div class="relative group">
<input class="w-full px-4 py-3.5 bg-surface-container-low border border-outline-variant/60 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-base text-on-surface placeholder:text-outline/60" id="email" placeholder="recruiter@company.ai" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label-uppercase text-label-uppercase text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary font-medium hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<input class="w-full px-4 py-3.5 bg-surface-container-low border border-outline-variant/60 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-base text-on-surface placeholder:text-outline/60" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button (Primary) -->
<button class="w-full py-4 mt-4 bg-primary text-on-primary font-body-base font-bold rounded-xl shadow-md shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Sign In
                    </button>
<div class="text-center mt-6">
<p class="text-body-sm text-on-surface-variant">Don't have an account? <a class="text-primary font-semibold hover:underline" href="#">Request access</a></p>
</div>
</form>
</div>
</div>
</main>
<!-- Background Decoration -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-primary-fixed-dim/30 blur-[150px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] bg-tertiary-fixed-dim/20 blur-[150px] rounded-full"></div>
</div>
</body></html>
