<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 500px; margin: 40px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { background: #2563eb; padding: 24px; text-align: center; }
    .header h1 { color: #fff; margin: 0; font-size: 20px; }
    .body { padding: 32px; color: #333; line-height: 1.6; }
    .cta { display: inline-block; margin-top: 24px; padding: 12px 28px; background: #2563eb; color: #fff; border-radius: 6px; text-decoration: none; font-weight: bold; }
    .footer { background: #f9f9f9; padding: 16px; text-align: center; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>New Recruiter Request 🔔</h1></div>
    <div class="body">
      <p>Hello Admin,</p>
      <p>A new recruiter has just registered and is awaiting your approval:</p>
      <p><strong>Email:</strong> {{ recruiter_email }}</p>
      <p>Please review their details and approve/reject them from your dashboard.</p>
      <a href="{{ admin_url }}" class="cta">Go to Admin Dashboard →</a>
    </div>
    <div class="footer">AI Interview Platform Notification System</div>
  </div>
</body>
</html>
